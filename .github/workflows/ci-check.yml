name: 'CI - Lint & Build'

on:
  pull_request:
    branches: ['*']
    types: [opened, synchronize, reopened]

  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci-check:
    name: 'Lint & Build'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -e ".[dev]"
          python -c "import pathlib, slack_sdk; p = pathlib.Path(slack_sdk.__file__).parent.parent / 'slack'; p.exists() and __import__('shutil').rmtree(p)"

      - name: Lint with Ruff
        run: ruff check src/ tests/

      - name: Format Check with Ruff
        run: ruff format --check src/ tests/

      - name: Type Check with mypy
        run: mypy src/

      - name: SAM Validate
        run: |
          pip install aws-sam-cli
          sam validate --template infra/template.yaml --lint
