name: 'E2E Tests'

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-tests:
    name: 'E2E Tests'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install Dependencies
        run: |
          pip install -e ".[dev]"
          python -c "import pathlib, slack_sdk; p = pathlib.Path(slack_sdk.__file__).parent.parent / 'slack'; p.exists() and __import__('shutil').rmtree(p)"

      - name: Read CloudFormation Stack Outputs
        id: cfn
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name sherpa \
            --query "Stacks[0].Outputs" \
            --output json)
          echo "API_GATEWAY_URL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="ApiEndpoint") | .OutputValue')" >> "$GITHUB_ENV"
          echo "SQS_QUEUE_URL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="QueueUrl") | .OutputValue')" >> "$GITHUB_ENV"
          echo "DYNAMODB_TABLE_NAME=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="TableName") | .OutputValue')" >> "$GITHUB_ENV"
          echo "S3_BUCKET_NAME=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="BucketName") | .OutputValue // empty')" >> "$GITHUB_ENV"

      - name: Run E2E Tests
        env:
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          KMS_KEY_ID: ${{ secrets.KMS_KEY_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          pytest tests/e2e/ \
            -v \
            -m e2e \
            --no-cov \
            -s
