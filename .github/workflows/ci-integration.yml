name: 'Integration Tests'

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integration-tests:
    name: 'Integration Tests'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -e ".[dev]"
          python -c "import pathlib, slack_sdk; p = pathlib.Path(slack_sdk.__file__).parent.parent / 'slack'; p.exists() and __import__('shutil').rmtree(p)"

      - name: Run Integration Tests
        run: |
          pytest tests/integration/ \
            -v \
            -m integration
