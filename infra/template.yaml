AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Sherpa - Adaptive AI onboarding Slack bot for nonprofits.
  6 Lambda functions, API Gateway, SQS FIFO, DynamoDB, S3.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures:
      - arm64
    Layers:
      - !Ref DepsLayer
    Environment:
      Variables:
        DYNAMODB_TABLE_NAME: !Ref StateTable
        S3_BUCKET_NAME: !Ref DocumentBucket
        PINECONE_INDEX_NAME: !Ref PineconeIndexName
        POWERTOOLS_SERVICE_NAME: sherpa
        POWERTOOLS_LOG_LEVEL: INFO
        LOG_LEVEL: INFO

Parameters:
  PineconeIndexName:
    Type: String
    Default: sherpa
  KillSwitchBudgetAmount:
    Type: Number
    Default: 5
  WarningBudgetAmount:
    Type: Number
    Default: 3.5

Resources:
  # ============================================================
  # API Gateway
  # ============================================================
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Description: Sherpa API - 5 routes

  # ============================================================
  # Lambda Layer (shared dependencies)
  # ============================================================
  DepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: sherpa-deps
      ContentUri: layers/deps
      Description: Python dependencies for all Lambda functions
      CompatibleRuntimes:
        - python3.12
      CompatibleArchitectures:
        - arm64
    Metadata:
      BuildMethod: makefile
      BuildArchitecture: arm64

  # ============================================================
  # Lambda Functions (6)
  # ============================================================
  SlackHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sherpa-slack-handler
      Handler: slack.handler.lambda_handler
      CodeUri: ../src
      Timeout: 10
      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref MessageQueue
          APP_SECRETS_ARN: !Ref AppSecrets
          KMS_KEY_ID: !Ref SecretsEncryptionKey
      Events:
        SlackEvents:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /slack/events
            Method: post
        SlackCommands:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /slack/commands
            Method: post
        SlackInteractions:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /slack/interactions
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StateTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt MessageQueue.QueueName
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref AppSecrets
        - Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource: !GetAtt SecretsEncryptionKey.Arn

  SlackOAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sherpa-slack-oauth
      Handler: slack.oauth.lambda_handler
      CodeUri: ../src
      Environment:
        Variables:
          APP_SECRETS_ARN: !Ref AppSecrets
          DYNAMODB_TABLE_NAME: !Ref StateTable
          KMS_KEY_ID: !Ref SecretsEncryptionKey
      Events:
        OAuthCallback:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /slack/oauth/callback
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StateTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref AppSecrets
        - Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource: !GetAtt SecretsEncryptionKey.Arn

  GoogleOAuthCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sherpa-google-oauth
      Handler: gcal.callback.lambda_handler
      CodeUri: ../src
      Environment:
        Variables:
          APP_SECRETS_ARN: !Ref AppSecrets
          DYNAMODB_TABLE_NAME: !Ref StateTable
          KMS_KEY_ID: !Ref SecretsEncryptionKey
      Events:
        GoogleCallback:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /google/oauth/callback
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StateTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref AppSecrets
        - Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource: !GetAtt SecretsEncryptionKey.Arn

  AgentWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sherpa-agent-worker
      Handler: agent.worker.lambda_handler
      CodeUri: ../src
      Timeout: 900
      MemorySize: 512
      Environment:
        Variables:
          APP_SECRETS_ARN: !Ref AppSecrets
          KMS_KEY_ID: !Ref SecretsEncryptionKey
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt MessageQueue.Arn
            BatchSize: 1
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StateTable
        - S3CrudPolicy:
            BucketName: !Ref DocumentBucket
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref AppSecrets
        - Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource: !GetAtt SecretsEncryptionKey.Arn

  KillSwitchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sherpa-kill-switch
      Handler: admin.kill_switch.lambda_handler
      CodeUri: ../src
      Events:
        BudgetAlarm:
          Type: SNS
          Properties:
            Topic: !Ref BudgetAlarmTopic
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StateTable
        - Statement:
            - Effect: Allow
              Action:
                - apigateway:PATCH
              Resource: !Sub "arn:aws:apigateway:${AWS::Region}::/restapis/${ApiGateway}/stages/prod"

  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sherpa-health-check
      Handler: admin.health_check.lambda_handler
      CodeUri: ../src
      Events:
        DailyCheck:
          Type: Schedule
          Properties:
            Schedule: cron(0 8 * * ? *)
            Description: Daily Pinecone health check at 8 AM UTC
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref AppSecrets

  # ============================================================
  # SQS
  # ============================================================
  MessageQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: sherpa-queue.fifo
      FifoQueue: true
      ContentBasedDeduplication: false
      VisibilityTimeout: 900
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: sherpa-dlq.fifo
      FifoQueue: true

  # ============================================================
  # DynamoDB
  # ============================================================
  StateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sherpa
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ============================================================
  # S3
  # ============================================================
  DocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "sherpa-docs-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireNoncurrentVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90

  # ============================================================
  # KMS
  # ============================================================
  SecretsEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Encrypts workspace SECRETS records in DynamoDB
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  SecretsEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/sherpa-secrets
      TargetKeyId: !Ref SecretsEncryptionKey

  # ============================================================
  # Secrets Manager
  # ============================================================
  AppSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: sherpa/secrets
      Description: Consolidated app secrets (Slack, Pinecone, Gemini, Google OAuth)

  # ============================================================
  # SNS + Budget Alarm
  # ============================================================
  BudgetAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: sherpa-budget-alarm

  # ============================================================
  # AWS Budget
  # ============================================================
  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: sherpa-monthly
        BudgetLimit:
          Amount: !Ref KillSwitchBudgetAmount
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 70
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: SNS
              Address: !Ref BudgetAlarmTopic
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: SNS
              Address: !Ref BudgetAlarmTopic
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 150
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: SNS
              Address: !Ref BudgetAlarmTopic

  # ============================================================
  # CloudWatch Alarms (3)
  # ============================================================
  DLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sherpa-dlq-messages
      AlarmDescription: Messages in DLQ (processing failures)
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt DeadLetterQueue.QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold

  LambdaErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sherpa-lambda-error-rate
      AlarmDescription: Agent Worker Lambda error rate > 5% over 5 minutes
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref AgentWorkerFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref AgentWorkerFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: error_rate
          Expression: "(errors / invocations) * 100"
          Label: Error Rate Percentage
          ReturnData: true
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  BudgetWarningAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: sherpa-budget-warning
      AlarmDescription: AWS spend approaching budget limit
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: !Ref WarningBudgetAmount
      ComparisonOperator: GreaterThanThreshold

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod"
  SlackEventsUrl:
    Description: URL for Slack Events subscription
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod/slack/events"
  QueueUrl:
    Description: SQS FIFO Queue URL
    Value: !Ref MessageQueue
  TableName:
    Description: DynamoDB table name
    Value: !Ref StateTable
  BucketName:
    Description: S3 document bucket name
    Value: !Ref DocumentBucket
